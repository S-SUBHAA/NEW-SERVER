name: Test and Notify

on: [push] # This means: "Run every time I push code"

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run my test
        run: |
          echo "Simulating a test..."
          exit 1  # This forces the test to FAIL so you can see the notification work

      - name: Slack Notification on Failure
        if: failure()  # <--- This is the "Magic" interviewer question answer
        run: echo "Sending Slack notification because the test above failed!"
