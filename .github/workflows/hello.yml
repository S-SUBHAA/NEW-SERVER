# 1. Give your robot a name
name: My First Automation

# 2. Tell the robot WHEN to wake up (on every 'push')
on: [push]

# 3. Tell the robot WHAT to do
jobs:
  say-hello-job:
    runs-on: ubuntu-latest # Use a Linux virtual machine
    steps:
      - name: Checkout my code
        uses: actions/checkout@v4 # This is the "download" step we discussed

      - name: Print a message
        run: echo "Hello, I am your GitHub Action robot!"

      - name: Show the date
        run: date
